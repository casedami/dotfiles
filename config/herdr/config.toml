onboarding = false
[terminal]
default_shell = "nu"

[theme]
name = "terminal"

[ui.toast]
delivery = "herdr"

[keys]
next_workspace = ["prefix+w"]
previous_workspace = ["prefix+W"]
next_agent = ["prefix+a"]
previous_agent = ["prefix+A"]
focus_pane_up = ["prefix+up"]
focus_pane_down = ["prefix+down"]
focus_pane_left = ["prefix+left"]
focus_pane_right = ["prefix+right"]
