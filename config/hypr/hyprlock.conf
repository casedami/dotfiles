source = ~/.config/hypr/colors.conf

general {
  disable_loading_bar = true
  hide_cursor = true
}

background {
  path = ~/wallpapers/dark/computer-1.png
  blur_passes = 2
}

# time
label {
  monitor =
  text = cmd[update:30000] echo "$(date +"%R")"
  font_size = 90
  font_family = Lilex Nerd Font
  position = 0, 200
  halign = center
  valign = center
}

# date
label {
  monitor =
  text = cmd[update:43200000] echo "$(date +"%A, %d %B %Y")"
  font_size = 25
  font_family = Lilex Nerd Font
  position = 0, 100
  halign = center
  valign = center
}

input-field {
  monitor =
  size = 300, 60
  outline_thickness = 4
  dots_size = 0.2
  dots_spacing = 0.2
  hide_input = false
  outer_color = $c_bright_green
  inner_color = $c_bright_black
  font_color = $c_bright_white
  placeholder_text = Enter Password
  position = 0, -35
  halign = center
  valign = center
}
